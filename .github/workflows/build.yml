name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            arch: amd64
            ext: .exe
          - os: linux
            runner: ubuntu-latest
            arch: amd64
            ext: ""
          - os: darwin
            runner: macos-latest
            arch: amd64
            ext: ""
          - os: darwin
            runner: macos-latest
            arch: arm64
            ext: ""

    defaults:
      run:
        working-directory: omniterm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: omniterm/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: omniterm/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: omniterm/frontend

      - name: Build (${{ matrix.os }}/${{ matrix.arch }})
        run: wails build -platform ${{ matrix.os }}/${{ matrix.arch }} -o "OmniMind${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniMind-${{ matrix.os }}-${{ matrix.arch }}
          path: omniterm/build/bin/OmniMind${{ matrix.ext }}
          if-no-files-found: error
