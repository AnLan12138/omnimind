name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            arch: amd64
            ext: .exe
          - os: linux
            runner: ubuntu-22.04
            arch: amd64
            ext: ""
          - os: darwin
            runner: macos-latest
            arch: amd64
            ext: ""
          - os: darwin
            runner: macos-latest
            arch: arm64
            ext: ""

    defaults:
      run:
        working-directory: omniterm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: omniterm/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: omniterm/frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev gcc build-essential pkg-config libcanberra-gtk3-module

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: omniterm/frontend

      - name: Build (${{ matrix.os }}/${{ matrix.arch }})
        run: wails build -platform ${{ matrix.os }}/${{ matrix.arch }}

      - name: Rename macOS binary
        if: runner.os == 'macOS'
        run: |
          cp build/bin/omnimind.app/Contents/MacOS/OmniMind "build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}"
          chmod +x "build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}"
        working-directory: omniterm

      - name: Rename Windows binary
        if: matrix.os == 'windows'
        run: mv "build/bin/OmniMind.exe" "build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}.exe"
        working-directory: omniterm

      - name: Rename Linux binary
        if: matrix.os == 'linux'
        run: |
          mv build/bin/omnimind "build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}" || \
          cp "$(find build/bin -type f -not -path '*app*' | head -1)" "build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}"
        working-directory: omniterm

      - name: Package NSIS (Windows)
        if: matrix.os == 'windows'
        run: wails build -platform windows/amd64 -nsis
        working-directory: omniterm
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniMind-${{ matrix.os }}-${{ matrix.arch }}
          path: omniterm/build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: omniterm/build/bin/OmniMind-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
