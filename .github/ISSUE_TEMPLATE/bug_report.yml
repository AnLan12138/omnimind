name: 🐛 Bug 报告
description: 报告一个 Bug，帮助改进 OmniMind
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请填写以下信息，帮助我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: OmniMind 版本
      description: 在「关于」对话框查看版本号
      placeholder: "v0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
        - 其他
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 一步一步说明如何复现此 Bug
      placeholder: |
        1. 打开 OmniMind
        2. 新建 SSH 连接到 ...
        3. 点击 ...
        4. 观察到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 如有错误日志或截图，请附上（拖拽到此处）
      placeholder: |
        日志文件位置：
        - Windows: %APPDATA%/omnimind/logs/
        - macOS/Linux: ~/.omnimind/logs/

  - type: checkboxes
    id: checks
    attributes:
      label: 确认
      options:
        - label: 我已搜索过已存在的 Issues，确认没有重复
          required: true
        - label: 这是最新版本的问题
          required: true
