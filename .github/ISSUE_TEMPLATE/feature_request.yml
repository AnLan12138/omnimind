name: 💡 功能建议
description: 建议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议！请描述你的想法和使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 清晰描述你遇到的痛点或需求
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 描述你希望如何实现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 其他工具中是否已有类似功能？

  - type: dropdown
    id: protocol
    attributes:
      label: 涉及协议
      description: 如果与特定协议相关，请选择
      multiple: true
      options:
        - SSH
        - Telnet
        - RDP
        - VNC
        - FTP/SFTP
        - MOSH
        - Serial
        - 不涉及协议

  - type: checkboxes
    id: checks
    attributes:
      label: 确认
      options:
        - label: 我已搜索过已存在的 Issues，确认没有重复
          required: true
